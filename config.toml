# ─────────────────────────────────────────────────────────────────────────────
# Zola site configuration
# https://www.getzola.org/documentation/getting-started/configuration/
# ─────────────────────────────────────────────────────────────────────────────

base_url      = "https://example.com"
title         = "My Site"
description   = "A personal blog."

compile_sass    = false
minify_html     = false
generate_feeds  = true
feed_filenames  = ["atom.xml"]

taxonomies = [
  { name = "tags", feed = true },
]

[markdown]
smart_punctuation = true

# Syntax highlighting via Giallo (Zola 0.22+). Pick a dark theme from:
# https://textmate-grammars-themes.netlify.app/
[markdown.highlighting]
theme = "gruvbox-dark-medium"

# ─────────────────────────────────────────────────────────────────────────────
# Theme
# ─────────────────────────────────────────────────────────────────────────────
# This site doubles as a Zola theme. When someone forks or submodules it into
# their themes/ directory, theme.toml provides the metadata. When used as a
# standalone site, these settings drive the design.
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# Extra — site-wide template variables
# ─────────────────────────────────────────────────────────────────────────────
[extra]

# Site author name (used in post bylines and footer)
author = "Your Name"

# Show author in post bylines. Set to false to hide.
show_author = true

# Show estimated reading time on posts
show_reading_time = true

# Default colour theme from the 96-theme suite.
# Format: {hue}-{mood}-{depth}  (hues: amber orange rose magenta violet blue teal green)
#                                (moods: soft neutral vivid deep)
#                                (depths: dim dark darker)
theme_default = "amber-soft-dark"

# Table of contents depth for posts (0 = disabled, 2-4 = heading levels)
toc_depth = 2

# Optional nav links rendered in the site header
nav_items = [
  { name = "Posts", url = "/posts" },
  { name = "Archive", url = "/archive" },
  { name = "About", url = "/about" },
]

# Default Open Graph image for social shares. Replace with your own.
# Use a full URL (https://...) for social platforms to resolve it.
og_image = ""

# Social links shown in the footer. Remove or comment out any you don't need.
socials = [
  # { name = "GitHub",   url = "https://github.com/", icon = "github" },
  # { name = "Mastodon", url = "https://", icon = "mastodon" },
  # { name = "Bluesky",  url = "https://", icon = "bluesky" },
  # { name = "Twitter",  url = "https://", icon = "twitter" },
  # { name = "Email",    url = "mailto:",  icon = "email" },
]

# ─────────────────────────────────────────────────────────────────────────────
# Standard.site — AT Protocol long-form publishing
# https://standard.site/docs/introduction/
#
# 1. Create a site.standard.publication record on your PDS.
# 2. Fill in the three fields below.
# 3. Update static/.well-known/site.standard.publication with the same AT-URI.
# ─────────────────────────────────────────────────────────────────────────────

# Your AT Protocol DID. Supports both did:plc and did:web.
# Example: "did:plc:ofrbh253gwicbkc5nktqepol"
atproto_did = "did:plc:YOURDIIDHERE"

# The rkey of your site.standard.publication record.
# "self" is the conventional default for a root publication.
standard_site_publication_rkey = "self"

# Full AT-URI of the publication record.
# Keep this in sync with atproto_did + standard_site_publication_rkey above.
# Format: at://{did}/site.standard.publication/{rkey}
standard_site_publication_at_uri = "at://did:plc:YOURDIIDHERE/site.standard.publication/self"

# Whether to emit the optional publication discovery <link> hint in every
# page <head>. This is a hint for crawlers — verification always goes through
# /.well-known/site.standard.publication, not this tag.
standard_site_discovery_hint = true
