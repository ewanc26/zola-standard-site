<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1a1816"/>
  <rect x="80" y="80" width="1040" height="470" rx="6" fill="none" stroke="#38342b" stroke-width="1"/>
  <text x="120" y="340" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="600" fill="#ede9e0" letter-spacing="-0.02em">
    {{ config.title | default(value="My Site") }}
  </text>
  <text x="120" y="410" font-family="JetBrains Mono, monospace" font-size="22" fill="#9e9688" letter-spacing="0.04em">
    {{ config.description | default(value="A personal blog.") }}
  </text>
  <circle cx="1120" cy="110" r="8" fill="#d4a040"/>
</svg>
